<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <style>
      .border { fill: none; stroke: #5b6abf; stroke-width: 1.5; rx: 6; }
      .fill-bg { fill: #fffffc; }
      .field-bg { fill: #eaf8ff; }
      .label { fill: #2d2640; font-size: 11px; }
      .desc { fill: #8b5fbf; font-size: 10px; font-style: italic; }
    </style>
  </defs>
  <!-- Horizontal mode -->
  <text class="label" x="15" y="14" font-weight="700">Horizontal mode (default)</text>
  <rect class="fill-bg" x="10" y="22" width="240" height="90" rx="6"/>
  <rect class="border" x="10" y="22" width="240" height="90"/>
  <text class="label" x="86" y="46" text-anchor="end" font-size="10">[label, right-aligned]</text>
  <rect class="field-bg" x="94" y="34" width="146" height="18" rx="3"/>
  <text class="label" x="100" y="48" font-size="10">[field, flex]</text>
  <text class="label" x="86" y="70" text-anchor="end" font-size="10">[label]</text>
  <rect class="field-bg" x="94" y="58" width="146" height="18" rx="3"/>
  <text class="label" x="100" y="72" font-size="10">[field]</text>
  <text class="label" x="86" y="94" text-anchor="end" font-size="10">[label]</text>
  <rect class="field-bg" x="94" y="82" width="146" height="18" rx="3"/>
  <text class="label" x="100" y="96" font-size="10">[field]</text>
  <!-- Vertical mode -->
  <text class="label" x="285" y="14" font-weight="700">Vertical mode</text>
  <rect class="fill-bg" x="280" y="22" width="230" height="110" rx="6"/>
  <rect class="border" x="280" y="22" width="230" height="110"/>
  <text class="label" x="292" y="42" font-size="10">[label, left-aligned]</text>
  <rect class="field-bg" x="292" y="48" width="206" height="18" rx="3"/>
  <text class="label" x="298" y="62" font-size="10">[field, full width]</text>
  <text class="label" x="292" y="86" font-size="10">[label]</text>
  <rect class="field-bg" x="292" y="92" width="206" height="18" rx="3"/>
  <text class="label" x="298" y="106" font-size="10">[field]</text>
  <!-- Legend -->
  <text class="desc" x="10" y="155">Horizontal: label 33% right-aligned, field 67% flex | Vertical: label above field, both full width</text>
</svg>
