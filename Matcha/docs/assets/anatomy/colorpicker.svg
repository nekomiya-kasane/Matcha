<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220">
  <!-- Dialog frame -->
  <rect x="4" y="4" width="340" height="195" rx="5" fill="#fffffc" stroke="#3b2d5e" stroke-width="1.2"/>
  <text x="10" y="14" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">ColorPicker Dialog</text>
  <!-- SV Field -->
  <defs>
    <linearGradient id="svH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <linearGradient id="svV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect x="10" y="18" width="328" height="70" rx="3" fill="url(#svH)"/>
  <rect x="10" y="18" width="328" height="70" rx="3" fill="url(#svV)"/>
  <text x="14" y="28" font-family="sans-serif" font-size="7" fill="#fffffc" font-style="italic">Saturation / Value Field</text>
  <!-- Selector dot -->
  <circle cx="200" cy="45" r="6" fill="none" stroke="#fffffc" stroke-width="1.5"/>
  <circle cx="200" cy="45" r="2" fill="#fffffc"/>
  <text x="214" y="48" font-family="sans-serif" font-size="7" fill="#fffffc">● selector</text>
  <!-- Hue Bar -->
  <defs>
    <linearGradient id="hue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff0000"/>
      <stop offset="17%" stop-color="#ffff00"/>
      <stop offset="33%" stop-color="#00ff00"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="67%" stop-color="#0000ff"/>
      <stop offset="83%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>
  <rect x="10" y="92" width="328" height="16" rx="3" fill="url(#hue)"/>
  <text x="14" y="101" font-family="sans-serif" font-size="7" fill="#fffffc" font-style="italic">Hue Bar</text>
  <rect x="120" y="90" width="4" height="20" rx="1" fill="#fffffc" stroke="#3b2d5e" stroke-width="0.5"/>
  <!-- Alpha Bar -->
  <rect x="10" y="112" width="328" height="16" rx="3" fill="#d8cfe8" opacity="0.3" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="14" y="122" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">Alpha Bar (optional)</text>
  <rect x="250" y="110" width="4" height="20" rx="1" fill="#fffffc" stroke="#3b2d5e" stroke-width="0.5"/>
  <!-- Hex + RGBA inputs -->
  <text x="14" y="144" font-family="sans-serif" font-size="8" fill="#2d2640">Hex:</text>
  <rect x="34" y="135" width="60" height="14" rx="2" fill="#eaf8ff" opacity="0.3" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="40" y="145" font-family="sans-serif" font-size="8" fill="#2d2640">#FF6600</text>
  <text x="102" y="144" font-family="sans-serif" font-size="8" fill="#2d2640">R:</text>
  <rect x="114" y="135" width="30" height="14" rx="2" fill="#eaf8ff" opacity="0.3" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="120" y="145" font-family="sans-serif" font-size="8" fill="#2d2640">255</text>
  <text x="150" y="144" font-family="sans-serif" font-size="8" fill="#2d2640">G:</text>
  <rect x="162" y="135" width="30" height="14" rx="2" fill="#eaf8ff" opacity="0.3" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="168" y="145" font-family="sans-serif" font-size="8" fill="#2d2640">102</text>
  <text x="198" y="144" font-family="sans-serif" font-size="8" fill="#2d2640">B:</text>
  <rect x="208" y="135" width="30" height="14" rx="2" fill="#eaf8ff" opacity="0.3" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="214" y="145" font-family="sans-serif" font-size="8" fill="#2d2640">0</text>
  <text x="244" y="144" font-family="sans-serif" font-size="8" fill="#2d2640">A:</text>
  <rect x="256" y="135" width="30" height="14" rx="2" fill="#eaf8ff" opacity="0.3" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="262" y="145" font-family="sans-serif" font-size="8" fill="#2d2640">255</text>
  <!-- Preview -->
  <text x="14" y="166" font-family="sans-serif" font-size="8" fill="#2d2640">Preview:</text>
  <rect x="60" y="156" width="30" height="14" rx="2" fill="#cc5500" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="67" y="165" font-family="sans-serif" font-size="6" fill="#fffffc">old</text>
  <rect x="90" y="156" width="30" height="14" rx="2" fill="#ff6600" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="97" y="165" font-family="sans-serif" font-size="6" fill="#fffffc">new</text>
  <!-- Buttons -->
  <rect x="260" y="156" width="36" height="16" rx="3" fill="#5b6abf" opacity="0.8"/>
  <text x="278" y="167" font-family="sans-serif" font-size="8" fill="#fffffc" text-anchor="middle">OK</text>
  <rect x="300" y="156" width="36" height="16" rx="3" fill="#d8cfe8" opacity="0.4"/>
  <text x="318" y="167" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="middle">Cancel</text>
  <!-- Legend -->
  <rect x="10" y="206" width="8" height="8" rx="1" fill="#ff6600"/>
  <text x="22" y="213" font-family="sans-serif" font-size="7" fill="#2d2640">SV Field</text>
  <rect x="70" y="206" width="20" height="8" rx="1" fill="url(#hue)"/>
  <text x="94" y="213" font-family="sans-serif" font-size="7" fill="#2d2640">Hue</text>
  <rect x="120" y="206" width="8" height="8" rx="1" fill="#d8cfe8" opacity="0.4"/>
  <text x="132" y="213" font-family="sans-serif" font-size="7" fill="#2d2640">Alpha</text>
  <rect x="170" y="206" width="8" height="8" rx="1" fill="#eaf8ff" opacity="0.3" stroke="#d8cfe8" stroke-width="0.4"/>
  <text x="182" y="213" font-family="sans-serif" font-size="7" fill="#2d2640">Inputs</text>
</svg>
