<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Determinate -->
  <text x="4" y="12" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Determinate:</text>
  <rect x="4" y="16" width="360" height="14" rx="7" fill="#d8cfe8" opacity="0.3"/>
  <text x="8" y="25" font-family="sans-serif" font-size="6" fill="#8b5fbf" font-style="italic">Track (FillMuted, RadiusFull)</text>
  <rect x="4" y="16" width="150" height="14" rx="7" fill="#5b6abf" opacity="0.7"/>
  <text x="70" y="26" font-family="sans-serif" font-size="7" fill="#fffffc" text-anchor="middle">Fill (Primary)</text>
  <!-- Indeterminate -->
  <text x="4" y="50" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Indeterminate:</text>
  <rect x="4" y="54" width="360" height="14" rx="7" fill="#d8cfe8" opacity="0.3"/>
  <text x="8" y="63" font-family="sans-serif" font-size="6" fill="#8b5fbf" font-style="italic">Track (FillMuted)</text>
  <rect x="80" y="54" width="108" height="14" rx="7" fill="#5b6abf" opacity="0.5"/>
  <text x="134" y="64" font-family="sans-serif" font-size="7" fill="#fffffc" text-anchor="middle">sliding fill (30%)</text>
  <!-- Arrows to indicate sliding -->
  <text x="74" y="64" font-family="sans-serif" font-size="8" fill="#5b6abf">←</text>
  <text x="190" y="64" font-family="sans-serif" font-size="8" fill="#5b6abf">→</text>
  <!-- Legend -->
  <rect x="10" y="82" width="10" height="10" rx="5" fill="#d8cfe8" opacity="0.4"/>
  <text x="24" y="91" font-family="sans-serif" font-size="7" fill="#2d2640">Track (FillMuted)</text>
  <rect x="130" y="82" width="10" height="10" rx="5" fill="#5b6abf" opacity="0.7"/>
  <text x="144" y="91" font-family="sans-serif" font-size="7" fill="#2d2640">Fill (Primary)</text>
  <rect x="240" y="82" width="10" height="10" rx="5" fill="#5b6abf" opacity="0.4"/>
  <text x="254" y="91" font-family="sans-serif" font-size="7" fill="#2d2640">Sliding fill (indeterminate)</text>
</svg>
