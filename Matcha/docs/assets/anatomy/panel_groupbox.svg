<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" width="460" height="120">
  <!-- Panel -->
  <text x="4" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Panel</text>
  <rect x="4" y="14" width="200" height="68" rx="6" fill="#eaf8ff" opacity="0.35" stroke="#d8cfe8" stroke-width="1.2"/>
  <text x="104" y="52" font-family="sans-serif" font-size="9" fill="#2d2640" text-anchor="middle">(child content — pure container)</text>
  <text x="104" y="64" font-family="sans-serif" font-size="7" fill="#8b5fbf" text-anchor="middle">SurfaceContainer, BorderSubtle, radius=Medium</text>
  <!-- GroupBox -->
  <text x="230" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">GroupBox</text>
  <rect x="230" y="14" width="220" height="68" rx="4" fill="none" stroke="#3b2d5e" stroke-width="1.2" stroke-dasharray="4,2"/>
  <!-- GroupBox title row -->
  <rect x="236" y="18" width="208" height="20" rx="2" fill="#fff0d6" opacity="0.45"/>
  <rect x="240" y="22" width="12" height="12" rx="2" fill="#8b5fbf" opacity="0.35"/>
  <text x="246" y="31" font-family="sans-serif" font-size="9" fill="#3b2d5e" text-anchor="middle">▶</text>
  <rect x="258" y="22" width="100" height="12" rx="2" fill="#fdffb6" opacity="0.45"/>
  <text x="308" y="31" font-family="sans-serif" font-size="9" fill="#2d2640" text-anchor="middle">Title (Heading)</text>
  <!-- GroupBox content area -->
  <rect x="236" y="42" width="208" height="34" rx="2" fill="#eaf8ff" opacity="0.3" stroke="#5b6abf" stroke-width="0.6"/>
  <text x="340" y="63" font-family="sans-serif" font-size="9" fill="#2d2640" text-anchor="middle">(child content)</text>
  <!-- Legend -->
  <rect x="10" y="98" width="10" height="10" rx="1" fill="#eaf8ff" stroke="#d8cfe8" stroke-width="0.8"/>
  <text x="24" y="107" font-family="sans-serif" font-size="8" fill="#2d2640">Container bg</text>
  <rect x="100" y="98" width="10" height="10" rx="2" fill="#8b5fbf" opacity="0.5"/>
  <text x="114" y="107" font-family="sans-serif" font-size="8" fill="#2d2640">Chevron</text>
  <rect x="165" y="98" width="10" height="10" rx="1" fill="#fdffb6" opacity="0.7"/>
  <text x="179" y="107" font-family="sans-serif" font-size="8" fill="#2d2640">Title</text>
  <rect x="210" y="98" width="10" height="10" rx="1" fill="#eaf8ff" stroke="#5b6abf" stroke-width="0.5"/>
  <text x="224" y="107" font-family="sans-serif" font-size="8" fill="#2d2640">Content area</text>
</svg>
