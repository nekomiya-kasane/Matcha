<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <!-- Unchecked state -->
  <text x="4" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Unchecked</text>
  <rect x="4" y="14" width="22" height="22" rx="3" fill="#fffffc" stroke="#3b2d5e" stroke-width="1.5"/>
  <rect x="30" y="18" width="8" height="14" rx="1" fill="#caffbf" opacity="0.4"/>
  <rect x="42" y="14" width="70" height="22" rx="2" fill="#fdffb6" opacity="0.45"/>
  <text x="77" y="29" font-family="sans-serif" font-size="11" fill="#2d2640" text-anchor="middle">Label</text>
  <!-- Checked state -->
  <text x="140" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Checked</text>
  <rect x="140" y="14" width="22" height="22" rx="3" fill="#5b6abf" stroke="#3b2d5e" stroke-width="1.5"/>
  <text x="151" y="30" font-family="sans-serif" font-size="14" fill="#fffffc" text-anchor="middle">✓</text>
  <rect x="166" y="18" width="8" height="14" rx="1" fill="#caffbf" opacity="0.4"/>
  <rect x="178" y="14" width="70" height="22" rx="2" fill="#fdffb6" opacity="0.45"/>
  <text x="213" y="29" font-family="sans-serif" font-size="11" fill="#2d2640" text-anchor="middle">Label</text>
  <!-- Legend -->
  <rect x="4" y="44" width="10" height="10" rx="2" fill="#5b6abf" opacity="0.7"/>
  <text x="18" y="53" font-family="sans-serif" font-size="8" fill="#2d2640">Indicator</text>
  <rect x="70" y="44" width="10" height="10" rx="1" fill="#caffbf" opacity="0.6"/>
  <text x="84" y="53" font-family="sans-serif" font-size="8" fill="#2d2640">Gap</text>
  <rect x="110" y="44" width="10" height="10" rx="1" fill="#fdffb6" opacity="0.7"/>
  <text x="124" y="53" font-family="sans-serif" font-size="8" fill="#2d2640">Label</text>
</svg>
