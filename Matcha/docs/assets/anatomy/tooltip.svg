<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Simple Tooltip -->
  <text x="4" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Simple Tooltip:</text>
  <rect x="4" y="14" width="160" height="22" rx="3" fill="#2d2640" opacity="0.9"/>
  <text x="14" y="28" font-family="sans-serif" font-size="9" fill="#fffffc">Label text</text>
  <!-- Arrow -->
  <polygon points="60,36 68,36 64,42" fill="#2d2640" opacity="0.9"/>
  <text x="80" y="44" font-family="sans-serif" font-size="7" fill="#8b5fbf">▽ arrow → anchor</text>
  <!-- Rich Tooltip -->
  <text x="220" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Rich Tooltip:</text>
  <rect x="220" y="14" width="170" height="40" rx="3" fill="#2d2640" opacity="0.9"/>
  <!-- Icon slot -->
  <rect x="226" y="20" width="12" height="12" rx="2" fill="#5b6abf" opacity="0.4"/>
  <text x="232" y="29" font-family="sans-serif" font-size="7" fill="#fffffc" text-anchor="middle">◎</text>
  <!-- Title -->
  <text x="244" y="29" font-family="sans-serif" font-size="9" fill="#fffffc" font-weight="bold">Title</text>
  <!-- Description -->
  <text x="244" y="44" font-family="sans-serif" font-size="8" fill="#d8cfe8">Description text</text>
  <text x="340" y="44" font-family="sans-serif" font-size="6" fill="#8b5fbf">(TextSecondary)</text>
  <!-- Arrow -->
  <polygon points="290,54 298,54 294,60" fill="#2d2640" opacity="0.9"/>
  <text x="306" y="62" font-family="sans-serif" font-size="7" fill="#8b5fbf">▽</text>
  <!-- Legend -->
  <rect x="10" y="80" width="14" height="10" rx="2" fill="#2d2640" opacity="0.9"/>
  <text x="28" y="89" font-family="sans-serif" font-size="7" fill="#2d2640">Tooltip bg (Spotlight)</text>
  <polygon points="120,80 128,80 124,86" fill="#2d2640" opacity="0.9"/>
  <text x="134" y="89" font-family="sans-serif" font-size="7" fill="#2d2640">Arrow/caret</text>
  <rect x="200" y="80" width="10" height="10" rx="2" fill="#5b6abf" opacity="0.4"/>
  <text x="214" y="89" font-family="sans-serif" font-size="7" fill="#2d2640">Icon (Rich only)</text>
  <rect x="300" y="80" width="30" height="10" rx="2" fill="none" stroke="#d8cfe8" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="334" y="89" font-family="sans-serif" font-size="7" fill="#2d2640">Description (Rich only)</text>
</svg>
