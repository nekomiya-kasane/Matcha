<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <style>
      .border { fill: none; stroke: #5b6abf; stroke-width: 1.5; rx: 6; }
      .fill-bg { fill: #eaf8ff; }
      .fill-panel { fill: #fffffc; }
      .label { fill: #2d2640; font-size: 12px; }
      .slot { fill: #5b6abf; font-size: 11px; font-weight: 600; }
      .desc { fill: #8b5fbf; font-size: 11px; font-style: italic; }
      .selected { fill: #5b6abf; opacity: 0.15; }
      .day-header { fill: #8b5fbf; font-size: 11px; font-weight: 600; }
    </style>
  </defs>
  <!-- Trigger -->
  <rect class="fill-bg" x="10" y="10" width="340" height="36" rx="6"/>
  <rect class="border" x="10" y="10" width="340" height="36"/>
  <text class="label" x="20" y="33">2025-01-15  14:30</text>
  <text class="label" x="322" y="33">📅</text>
  <text class="slot" x="356" y="33">① Trigger</text>
  <!-- arrow -->
  <text class="desc" x="160" y="62">↓ (open)</text>
  <!-- Calendar Popup -->
  <rect class="fill-panel" x="10" y="70" width="340" height="230" rx="6"/>
  <rect class="border" x="10" y="70" width="340" height="230"/>
  <!-- Month nav -->
  <rect x="20" y="80" width="28" height="24" rx="4" fill="#d8cfe8" opacity="0.5"/>
  <text class="label" x="28" y="97" text-anchor="middle">◀</text>
  <text class="label" x="170" y="97" text-anchor="middle" font-weight="700">January 2025</text>
  <rect x="292" y="80" width="28" height="24" rx="4" fill="#d8cfe8" opacity="0.5"/>
  <text class="label" x="300" y="97" text-anchor="middle">▶</text>
  <text class="slot" x="340" y="97">② Month nav</text>
  <!-- Day headers -->
  <text class="day-header" x="35" y="120">Mo</text>
  <text class="day-header" x="75" y="120">Tu</text>
  <text class="day-header" x="115" y="120">We</text>
  <text class="day-header" x="155" y="120">Th</text>
  <text class="day-header" x="195" y="120">Fr</text>
  <text class="day-header" x="235" y="120">Sa</text>
  <text class="day-header" x="275" y="120">Su</text>
  <!-- Day grid rows -->
  <text class="label" x="155" y="140" font-size="11">1</text>
  <text class="label" x="195" y="140" font-size="11">2</text>
  <text class="label" x="235" y="140" font-size="11">3</text>
  <text class="label" x="275" y="140" font-size="11">4</text>
  <text class="label" x="35" y="158" font-size="11">6</text>
  <text class="label" x="75" y="158" font-size="11">7</text>
  <text class="label" x="115" y="158" font-size="11">8</text>
  <text class="label" x="155" y="158" font-size="11">9</text>
  <text class="label" x="195" y="158" font-size="11">10</text>
  <text class="label" x="235" y="158" font-size="11">11</text>
  <text class="label" x="275" y="158" font-size="11">12</text>
  <text class="label" x="35" y="176" font-size="11">13</text>
  <text class="label" x="75" y="176" font-size="11">14</text>
  <!-- selected day -->
  <circle cx="118" cy="172" r="12" fill="#5b6abf" opacity="0.2"/>
  <text x="115" y="176" font-size="11" fill="#3b2d5e" font-weight="700">15</text>
  <text class="label" x="155" y="176" font-size="11">16</text>
  <text class="label" x="195" y="176" font-size="11">17</text>
  <text class="label" x="235" y="176" font-size="11">18</text>
  <text class="label" x="275" y="176" font-size="11">19</text>
  <text class="slot" x="340" y="158">③ Day grid</text>
  <!-- Time section -->
  <rect x="20" y="240" width="200" height="36" rx="6" fill="#eaf8ff" opacity="0.5"/>
  <rect x="20" y="240" width="200" height="36" rx="6" fill="none" stroke="#5b6abf" stroke-width="1" stroke-dasharray="4"/>
  <text class="desc" x="26" y="252" font-size="10">Time</text>
  <rect x="30" y="254" width="40" height="18" rx="3" fill="#d8cfe8" opacity="0.5"/>
  <text class="label" x="42" y="268" text-anchor="middle" font-size="11">14</text>
  <text class="label" x="78" y="268" font-size="11">:</text>
  <rect x="90" y="254" width="40" height="18" rx="3" fill="#d8cfe8" opacity="0.5"/>
  <text class="label" x="102" y="268" text-anchor="middle" font-size="11">30</text>
  <text class="slot" x="340" y="265">④ Time spinners</text>
  <!-- Legend -->
  <text class="desc" x="10" y="312">① Trigger field  ② Month navigation  ③ Day grid (6×7)  ④ Time spinners (hour:minute)</text>
</svg>
