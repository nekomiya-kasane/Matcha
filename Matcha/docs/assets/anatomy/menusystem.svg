<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" width="420" height="200">
  <!-- MenuBar -->
  <rect x="4" y="4" width="400" height="24" rx="3" fill="#eaf8ff" opacity="0.3" stroke="#3b2d5e" stroke-width="1"/>
  <text x="8" y="14" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">MenuBar (SurfaceContainer)</text>
  <text x="14" y="24" font-family="sans-serif" font-size="9" fill="#2d2640">[File ▾]</text>
  <text x="66" y="24" font-family="sans-serif" font-size="9" fill="#2d2640">[Edit ▾]</text>
  <text x="116" y="24" font-family="sans-serif" font-size="9" fill="#2d2640">[View ▾]</text>
  <text x="168" y="24" font-family="sans-serif" font-size="9" fill="#2d2640">[Help ▾]</text>
  <!-- Dropdown arrow -->
  <line x1="30" y1="28" x2="30" y2="38" stroke="#8b5fbf" stroke-width="1"/>
  <text x="30" y="44" font-family="sans-serif" font-size="9" fill="#8b5fbf" text-anchor="middle">▼</text>
  <!-- Menu dropdown -->
  <rect x="10" y="48" width="310" height="120" rx="4" fill="#fffffc" stroke="#3b2d5e" stroke-width="1"/>
  <text x="14" y="58" font-family="sans-serif" font-size="7" fill="#8b5fbf" font-style="italic">Menu (SurfaceElevated)</text>
  <!-- MenuItem normal -->
  <rect x="14" y="62" width="302" height="18" rx="2" fill="#fffffc" stroke="#d8cfe8" stroke-width="0.4"/>
  <rect x="18" y="64" width="12" height="12" rx="2" fill="#d8cfe8" opacity="0.3"/>
  <text x="24" y="74" font-family="sans-serif" font-size="8" fill="#3b2d5e" text-anchor="middle">◎</text>
  <text x="38" y="76" font-family="sans-serif" font-size="9" fill="#2d2640">Label</text>
  <text x="270" y="76" font-family="sans-serif" font-size="8" fill="#8b5fbf">Shortcut</text>
  <!-- MenuItem hovered (with submenu arrow) -->
  <rect x="14" y="82" width="302" height="18" rx="2" fill="#5b6abf" opacity="0.12" stroke="#5b6abf" stroke-width="0.6"/>
  <rect x="18" y="84" width="12" height="12" rx="2" fill="#5b6abf" opacity="0.25"/>
  <text x="24" y="94" font-family="sans-serif" font-size="8" fill="#fffffc" text-anchor="middle">◎</text>
  <text x="38" y="96" font-family="sans-serif" font-size="9" fill="#2d2640" font-weight="bold">Label</text>
  <text x="270" y="96" font-family="sans-serif" font-size="8" fill="#8b5fbf">Shortcut</text>
  <text x="308" y="96" font-family="sans-serif" font-size="10" fill="#5b6abf">▶</text>
  <text x="324" y="96" font-family="sans-serif" font-size="7" fill="#8b5fbf">submenu</text>
  <!-- Separator -->
  <line x1="18" y1="105" x2="312" y2="105" stroke="#d8cfe8" stroke-width="1"/>
  <text x="324" y="108" font-family="sans-serif" font-size="7" fill="#8b5fbf">separator</text>
  <!-- MenuCheckItem -->
  <rect x="14" y="110" width="302" height="18" rx="2" fill="#fffffc" stroke="#d8cfe8" stroke-width="0.4"/>
  <text x="24" y="123" font-family="sans-serif" font-size="10" fill="#5b6abf" text-anchor="middle">✓</text>
  <text x="38" y="124" font-family="sans-serif" font-size="9" fill="#2d2640">Toggle label</text>
  <!-- MenuItem disabled -->
  <rect x="14" y="130" width="302" height="18" rx="2" fill="#fffffc" opacity="0.5" stroke="#d8cfe8" stroke-width="0.3"/>
  <rect x="18" y="132" width="12" height="12" rx="2" fill="#d8cfe8" opacity="0.15"/>
  <text x="38" y="144" font-family="sans-serif" font-size="9" fill="#2d2640" opacity="0.45">Label (disabled)</text>
  <!-- Legend -->
  <rect x="10" y="180" width="10" height="10" rx="1" fill="#eaf8ff" opacity="0.4"/>
  <text x="24" y="189" font-family="sans-serif" font-size="8" fill="#2d2640">MenuBar</text>
  <rect x="80" y="180" width="10" height="10" rx="1" fill="#5b6abf" opacity="0.15"/>
  <text x="94" y="189" font-family="sans-serif" font-size="8" fill="#2d2640">Hovered</text>
  <line x1="145" y1="185" x2="165" y2="185" stroke="#d8cfe8" stroke-width="1"/>
  <text x="169" y="189" font-family="sans-serif" font-size="8" fill="#2d2640">Separator</text>
  <text x="225" y="189" font-family="sans-serif" font-size="10" fill="#5b6abf">✓</text>
  <text x="239" y="189" font-family="sans-serif" font-size="8" fill="#2d2640">Check item</text>
  <rect x="300" y="180" width="10" height="10" rx="1" fill="#fffffc" opacity="0.5" stroke="#d8cfe8" stroke-width="0.4"/>
  <text x="314" y="189" font-family="sans-serif" font-size="8" fill="#2d2640">Disabled</text>
</svg>
