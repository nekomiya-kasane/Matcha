<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" width="320" height="70">
  <!-- Off state -->
  <text x="4" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">Off</text>
  <rect x="4" y="14" width="44" height="24" rx="12" fill="#d8cfe8" stroke="#3b2d5e" stroke-width="1"/>
  <circle cx="18" cy="26" r="9" fill="#fffffc" stroke="#3b2d5e" stroke-width="1"/>
  <text x="60" y="30" font-family="sans-serif" font-size="8" fill="#3b2d5e">thumb at left</text>
  <!-- On state -->
  <text x="160" y="10" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">On</text>
  <rect x="160" y="14" width="44" height="24" rx="12" fill="#5b6abf" stroke="#3b2d5e" stroke-width="1"/>
  <circle cx="190" cy="26" r="9" fill="#fffffc" stroke="#3b2d5e" stroke-width="1"/>
  <text x="216" y="30" font-family="sans-serif" font-size="8" fill="#3b2d5e">thumb at right</text>
  <!-- Legend -->
  <rect x="4" y="50" width="10" height="10" rx="5" fill="#d8cfe8" opacity="0.7"/>
  <text x="18" y="59" font-family="sans-serif" font-size="8" fill="#2d2640">Track (off)</text>
  <rect x="80" y="50" width="10" height="10" rx="5" fill="#5b6abf" opacity="0.7"/>
  <text x="94" y="59" font-family="sans-serif" font-size="8" fill="#2d2640">Track (on)</text>
  <circle cx="165" cy="55" r="5" fill="#fffffc" stroke="#3b2d5e" stroke-width="1"/>
  <text x="174" y="59" font-family="sans-serif" font-size="8" fill="#2d2640">Thumb (16px)</text>
</svg>
