<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <!-- Outer frame -->
  <rect x="4" y="4" width="280" height="120" rx="4" fill="none" stroke="#3b2d5e" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="10" y="14" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">ListWidget</text>
  <!-- Item 0 -->
  <rect x="10" y="18" width="268" height="22" rx="2" fill="#fffffc" stroke="#d8cfe8" stroke-width="0.5"/>
