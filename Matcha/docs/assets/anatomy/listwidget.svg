  <text x="21" y="33" font-family="sans-serif" font-size="8" fill="#3b2d5e" text-anchor="middle">◎</text>
  <text x="40" y="33" font-family="sans-serif" font-size="9" fill="#2d2640">UiNode subtree content</text>
  <text x="284" y="33" font-family="sans-serif" font-size="7" fill="#8b5fbf">[0]</text>
  <!-- Item 1 (selected) -->
  <rect x="10" y="42" width="268" height="22" rx="2" fill="#5b6abf" opacity="0.18" stroke="#5b6abf" stroke-width="0.8"/>
  <rect x="14" y="46" width="14" height="14" rx="2" fill="#5b6abf" opacity="0.3"/>
  <text x="21" y="57" font-family="sans-serif" font-size="8" fill="#fffffc" text-anchor="middle">◎</text>
  <text x="40" y="57" font-family="sans-serif" font-size="9" fill="#2d2640" font-weight="bold">UiNode subtree content</text>
  <text x="284" y="57" font-family="sans-serif" font-size="7" fill="#5b6abf">[1] selected</text>
  <!-- Item 2 -->
  <rect x="10" y="66" width="268" height="22" rx="2" fill="#fffffc" stroke="#d8cfe8" stroke-width="0.5"/>
  <rect x="14" y="70" width="14" height="14" rx="2" fill="#d8cfe8" opacity="0.35"/>
  <text x="21" y="81" font-family="sans-serif" font-size="8" fill="#3b2d5e" text-anchor="middle">◎</text>
