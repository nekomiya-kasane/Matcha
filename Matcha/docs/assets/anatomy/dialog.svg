<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" width="440" height="220">
  <!-- Overlay backdrop -->
  <rect x="0" y="0" width="440" height="190" rx="4" fill="#2d2640" opacity="0.12"/>
  <text x="6" y="12" font-family="sans-serif" font-size="7" fill="#fffffc" font-style="italic">Overlay (40% opacity)</text>
  <!-- Dialog card -->
  <rect x="60" y="24" width="320" height="150" rx="8" fill="#fffffc" stroke="#3b2d5e" stroke-width="1.2"/>
  <!-- DialogTitleBar -->
  <rect x="68" y="30" width="304" height="28" rx="3" fill="#fff0d6" opacity="0.45"/>
  <text x="72" y="42" font-family="sans-serif" font-size="7" fill="#8b5fbf" font-style="italic">DialogTitleBar</text>
  <text x="76" y="54" font-family="sans-serif" font-size="10" fill="#2d2640" font-weight="bold">Title (Heading)</text>
  <!-- Close button -->
  <rect x="348" y="34" width="18" height="18" rx="3" fill="#ffadad" opacity="0.4"/>
  <text x="357" y="47" font-family="sans-serif" font-size="11" fill="#3b2d5e" text-anchor="middle">×</text>
  <!-- Content area -->
  <rect x="68" y="62" width="304" height="68" rx="2" fill="#eaf8ff" opacity="0.35" stroke="#5b6abf" stroke-width="0.6" stroke-dasharray="3,2"/>
  <text x="72" y="74" font-family="sans-serif" font-size="7" fill="#8b5fbf" font-style="italic">Content Area</text>
  <text x="220" y="100" font-family="sans-serif" font-size="9" fill="#2d2640" text-anchor="middle">(dialog body — form / message / custom content)</text>
  <!-- DialogFootBar -->
  <rect x="68" y="134" width="304" height="30" rx="3" fill="#d8cfe8" opacity="0.25"/>
  <text x="72" y="146" font-family="sans-serif" font-size="7" fill="#8b5fbf" font-style="italic">DialogFootBar</text>
  <!-- Cancel button -->
  <rect x="282" y="140" width="42" height="18" rx="3" fill="#d8cfe8" opacity="0.5" stroke="#3b2d5e" stroke-width="0.6"/>
  <text x="303" y="152" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="middle">Cancel</text>
  <!-- Accept button -->
  <rect x="330" y="140" width="42" height="18" rx="3" fill="#5b6abf" opacity="0.6"/>
  <text x="351" y="152" font-family="sans-serif" font-size="8" fill="#fffffc" text-anchor="middle">Accept</text>
  <!-- Legend -->
  <rect x="10" y="200" width="10" height="10" rx="1" fill="#2d2640" opacity="0.15"/>
  <text x="24" y="209" font-family="sans-serif" font-size="8" fill="#2d2640">Overlay</text>
  <rect x="70" y="200" width="10" height="10" rx="1" fill="#fff0d6" opacity="0.6"/>
  <text x="84" y="209" font-family="sans-serif" font-size="8" fill="#2d2640">TitleBar</text>
  <rect x="135" y="200" width="10" height="10" rx="1" fill="#eaf8ff" stroke="#5b6abf" stroke-width="0.5"/>
  <text x="149" y="209" font-family="sans-serif" font-size="8" fill="#2d2640">Content</text>
  <rect x="200" y="200" width="10" height="10" rx="1" fill="#d8cfe8" opacity="0.4"/>
  <text x="214" y="209" font-family="sans-serif" font-size="8" fill="#2d2640">FootBar</text>
  <rect x="260" y="200" width="10" height="10" rx="2" fill="#ffadad" opacity="0.5"/>
  <text x="274" y="209" font-family="sans-serif" font-size="8" fill="#2d2640">Close btn</text>
</svg>
