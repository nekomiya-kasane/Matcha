<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" width="260" height="200">
  <!-- Outer frame -->
  <rect x="4" y="4" width="120" height="160" rx="4" fill="#eaf8ff" opacity="0.2" stroke="#3b2d5e" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="10" y="14" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">ActionBar (vertical)</text>
  <!-- Active ActionTab -->
  <rect x="10" y="20" width="108" height="38" rx="4" fill="#5b6abf" opacity="0.2" stroke="#5b6abf" stroke-width="0.8"/>
  <rect x="44" y="24" width="20" height="20" rx="3" fill="#5b6abf" opacity="0.35"/>
  <text x="54" y="38" font-family="sans-serif" font-size="11" fill="#fffffc" text-anchor="middle">☰</text>
  <text x="54" y="53" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="middle">Label</text>
  <text x="130" y="42" font-family="sans-serif" font-size="7" fill="#8b5fbf">← active (PrimaryBg)</text>
  <!-- Inactive ActionTab -->
  <rect x="10" y="62" width="108" height="38" rx="4" fill="none" stroke="#d8cfe8" stroke-width="0.6"/>
  <rect x="44" y="66" width="20" height="20" rx="3" fill="#d8cfe8" opacity="0.3"/>
  <text x="54" y="80" font-family="sans-serif" font-size="11" fill="#3b2d5e" text-anchor="middle">◎</text>
  <text x="54" y="95" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="middle">Label</text>
  <text x="130" y="84" font-family="sans-serif" font-size="7" fill="#8b5fbf">← inactive (transparent)</text>
  <!-- Ellipsis -->
  <text x="54" y="115" font-family="sans-serif" font-size="10" fill="#8b5fbf" text-anchor="middle">···</text>
  <!-- Bottom-pinned ActionTab -->
  <rect x="10" y="122" width="108" height="36" rx="4" fill="none" stroke="#d8cfe8" stroke-width="0.6" stroke-dasharray="3,2"/>
  <rect x="44" y="126" width="20" height="20" rx="3" fill="#d8cfe8" opacity="0.3"/>
  <text x="54" y="140" font-family="sans-serif" font-size="11" fill="#3b2d5e" text-anchor="middle">⚙</text>
  <text x="130" y="142" font-family="sans-serif" font-size="7" fill="#8b5fbf">← pinned bottom</text>
  <!-- Legend -->
  <rect x="10" y="178" width="10" height="10" rx="2" fill="#5b6abf" opacity="0.3"/>
  <text x="24" y="187" font-family="sans-serif" font-size="8" fill="#2d2640">Active tab</text>
  <rect x="90" y="178" width="10" height="10" rx="2" fill="#d8cfe8" opacity="0.4"/>
  <text x="104" y="187" font-family="sans-serif" font-size="8" fill="#2d2640">Inactive tab</text>
  <rect x="175" y="178" width="10" height="10" rx="2" fill="none" stroke="#d8cfe8" stroke-width="0.6" stroke-dasharray="2,1"/>
  <text x="189" y="187" font-family="sans-serif" font-size="8" fill="#2d2640">Pinned</text>
</svg>
