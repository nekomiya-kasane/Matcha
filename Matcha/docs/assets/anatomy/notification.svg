<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <!-- Toast frame -->
  <rect x="4" y="4" width="350" height="38" rx="4" fill="#fffffc" stroke="#3b2d5e" stroke-width="1"/>
  <!-- Left accent bar -->
  <rect x="4" y="4" width="4" height="38" rx="2" fill="#5b6abf"/>
  <!-- Icon -->
  <circle cx="22" cy="18" r="6" fill="#5b6abf" opacity="0.25"/>
  <text x="22" y="21" font-family="sans-serif" font-size="8" fill="#5b6abf" text-anchor="middle">i</text>
  <!-- Message text -->
  <text x="36" y="22" font-family="sans-serif" font-size="9" fill="#2d2640">Message text here</text>
  <!-- Action button -->
  <rect x="270" y="10" width="46" height="16" rx="3" fill="#5b6abf" opacity="0.12"/>
  <text x="293" y="21" font-family="sans-serif" font-size="8" fill="#5b6abf" text-anchor="middle">Action</text>
  <!-- Close button -->
  <rect x="324" y="10" width="14" height="14" rx="7" fill="#d8cfe8" opacity="0.2"/>
  <text x="331" y="20" font-family="sans-serif" font-size="9" fill="#3b2d5e" text-anchor="middle">×</text>
  <!-- Accent label -->
  <text x="6" y="50" font-family="sans-serif" font-size="7" fill="#5b6abf">accent</text>
  <!-- Slide direction -->
  <text x="100" y="50" font-family="sans-serif" font-size="7" fill="#8b5fbf">← slides in from top, stacks downward →</text>
  <!-- Legend -->
  <rect x="10" y="62" width="4" height="10" rx="1" fill="#5b6abf"/>
  <text x="18" y="71" font-family="sans-serif" font-size="7" fill="#2d2640">Accent bar</text>
  <circle cx="84" cy="67" r="4" fill="#5b6abf" opacity="0.25"/>
  <text x="92" y="71" font-family="sans-serif" font-size="7" fill="#2d2640">Semantic icon</text>
  <rect x="160" y="62" width="10" height="10" rx="2" fill="#5b6abf" opacity="0.12"/>
  <text x="174" y="71" font-family="sans-serif" font-size="7" fill="#2d2640">Action btn</text>
  <rect x="235" y="62" width="8" height="8" rx="4" fill="#d8cfe8" opacity="0.2"/>
  <text x="247" y="71" font-family="sans-serif" font-size="7" fill="#2d2640">Close btn</text>
</svg>
