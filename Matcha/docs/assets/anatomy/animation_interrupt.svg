<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
  <!-- Title -->
  <text x="260" y="16" font-family="sans-serif" font-size="11" fill="#2d2640" text-anchor="middle" font-weight="600">Animation Interrupt &amp; Value Capture</text>

  <!-- Time axis -->
  <line x1="30" y1="55" x2="500" y2="55" stroke="#d8cfe8" stroke-width="1"/>
  <text x="510" y="58" font-family="sans-serif" font-size="8" fill="#3b2d5e" text-anchor="start">t</text>
  <!-- Arrow head -->
  <polygon points="500,52 508,55 500,58" fill="#d8cfe8"/>

  <!-- Old animation bar -->
  <rect x="50" y="40" width="240" height="12" rx="3" ry="3" fill="#5b6abf" opacity="0.7"/>
  <text x="170" y="49" font-family="sans-serif" font-size="8" fill="#fffffc" text-anchor="middle" font-weight="500">old anim (bg: gray → blue)</text>

  <!-- Interrupt point -->
  <line x1="290" y1="30" x2="290" y2="100" stroke="#ffadad" stroke-width="1.5" stroke-dasharray="4 2"/>
  <circle cx="290" cy="46" r="4" fill="#ffadad" stroke="#3b2d5e" stroke-width="0.8"/>

  <!-- Capture annotation -->
  <text x="290" y="26" font-family="sans-serif" font-size="8" fill="#e8a840" text-anchor="middle" font-weight="600">interrupt</text>

  <!-- New animation bar -->
  <rect x="290" y="64" width="190" height="12" rx="3" ry="3" fill="#7dd87d" opacity="0.7"/>
  <text x="385" y="73" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="middle" font-weight="500">new anim (bg: captured → red)</text>

  <!-- Capture arrow from old to new -->
  <line x1="290" y1="52" x2="290" y2="64" stroke="#e8a840" stroke-width="1.2"/>
  <polygon points="287,62 290,67 293,62" fill="#e8a840"/>

  <!-- Capture value label -->
  <text x="306" y="60" font-family="sans-serif" font-size="7" fill="#e8a840" text-anchor="start">currentValue()</text>

  <!-- Progress annotation below old bar -->
  <line x1="50" y1="57" x2="290" y2="57" stroke="#5b6abf" stroke-width="0.5" stroke-dasharray="2 1"/>
  <text x="170" y="104" font-family="sans-serif" font-size="7" fill="#5b6abf" text-anchor="middle">~60% interpolation at capture</text>

  <!-- Legend -->
  <rect x="50" y="115" width="12" height="8" rx="2" fill="#5b6abf" opacity="0.7"/>
  <text x="66" y="122" font-family="sans-serif" font-size="8" fill="#2d2640">Old animation</text>
  <rect x="160" y="115" width="12" height="8" rx="2" fill="#7dd87d" opacity="0.7"/>
  <text x="176" y="122" font-family="sans-serif" font-size="8" fill="#2d2640">New animation</text>
  <circle cx="276" cy="119" r="3" fill="#ffadad" stroke="#3b2d5e" stroke-width="0.5"/>
  <text x="283" y="122" font-family="sans-serif" font-size="8" fill="#2d2640">Interrupt point</text>
  <line x1="370" y1="119" x2="382" y2="119" stroke="#e8a840" stroke-width="1.2"/>
  <text x="386" y="122" font-family="sans-serif" font-size="8" fill="#2d2640">Value capture</text>
</svg>
