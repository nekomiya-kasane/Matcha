<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <style>
      .border { fill: none; stroke: #5b6abf; stroke-width: 1.5; rx: 6; }
      .fill-bg { fill: #fffffc; }
      .toast-bg { fill: #fffffc; stroke: #5b6abf; stroke-width: 1; rx: 4; }
      .label { fill: #2d2640; font-size: 11px; }
      .desc { fill: #8b5fbf; font-size: 10px; font-style: italic; }
      .window-bg { fill: #eaf8ff; opacity: 0.3; }
    </style>
  </defs>
  <!-- Window frame -->
  <rect class="window-bg" x="10" y="10" width="340" height="160" rx="8"/>
  <rect class="border" x="10" y="10" width="340" height="160"/>
  <text class="label" x="20" y="28" font-size="10" opacity="0.5">Window</text>
  <!-- Toast 1 (newest, top) -->
  <rect class="toast-bg" x="190" y="26" width="140" height="32" rx="4"/>
  <rect x="196" y="32" width="12" height="12" rx="2" fill="#7dd87d" opacity="0.4"/>
  <text class="label" x="214" y="46" font-size="9">Toast 1 (newest)</text>
  <text class="desc" x="356" y="46">← newest on top</text>
  <!-- Toast 2 -->
  <rect class="toast-bg" x="190" y="66" width="140" height="32" rx="4"/>
  <rect x="196" y="72" width="12" height="12" rx="2" fill="#5b6abf" opacity="0.3"/>
  <text class="label" x="214" y="86" font-size="9">Toast 2</text>
  <!-- Toast 3 (oldest, bottom) -->
  <rect class="toast-bg" x="190" y="106" width="140" height="32" rx="4"/>
  <rect x="196" y="112" width="12" height="12" rx="2" fill="#e8a840" opacity="0.4"/>
  <text class="label" x="214" y="126" font-size="9">Toast 3 (oldest)</text>
  <text class="desc" x="356" y="126">← oldest at bottom</text>
  <!-- Spacing annotation -->
  <line x1="336" y1="58" x2="336" y2="66" stroke="#d8cfe8" stroke-width="0.8" stroke-dasharray="2"/>
  <text class="desc" x="340" y="65" font-size="7">Px8</text>
  <line x1="336" y1="98" x2="336" y2="106" stroke="#d8cfe8" stroke-width="0.8" stroke-dasharray="2"/>
  <text class="desc" x="340" y="105" font-size="7">Px8</text>
  <!-- Legend -->
  <text class="desc" x="10" y="190">Position: top-right (16,16) | Stack: downward | Gap: Px8 | Max visible: 3 | Enter: SlideLeft 200ms | Exit: FadeOut 150ms</text>
</svg>
