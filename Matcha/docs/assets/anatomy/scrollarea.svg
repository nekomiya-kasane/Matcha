<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 180" width="340" height="180">
  <!-- Outer frame -->
  <rect x="4" y="4" width="320" height="130" rx="4" fill="none" stroke="#3b2d5e" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="10" y="14" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">ScrollArea</text>
  <!-- Viewport -->
  <rect x="10" y="20" width="270" height="90" rx="2" fill="#eaf8ff" opacity="0.5" stroke="#5b6abf" stroke-width="0.8"/>
  <text x="145" y="55" font-family="sans-serif" font-size="10" fill="#2d2640" text-anchor="middle">content (clipped)</text>
  <text x="145" y="70" font-family="sans-serif" font-size="8" fill="#8b5fbf" text-anchor="middle">Viewport</text>
  <!-- Vertical scrollbar -->
  <rect x="288" y="20" width="10" height="90" rx="5" fill="#d8cfe8" opacity="0.4"/>
  <rect x="289" y="24" width="8" height="30" rx="4" fill="#5b6abf" opacity="0.7"/>
  <text x="310" y="42" font-family="sans-serif" font-size="7" fill="#3b2d5e">v-bar</text>
  <!-- Horizontal scrollbar -->
  <rect x="10" y="116" width="270" height="10" rx="5" fill="#d8cfe8" opacity="0.4"/>
  <rect x="14" y="117" width="60" height="8" rx="4" fill="#5b6abf" opacity="0.7"/>
  <text x="140" y="124" font-family="sans-serif" font-size="7" fill="#3b2d5e" text-anchor="middle">h-bar</text>
  <!-- Legend -->
  <rect x="10" y="148" width="10" height="10" rx="1" fill="#eaf8ff" stroke="#5b6abf" stroke-width="0.5"/>
  <text x="24" y="157" font-family="sans-serif" font-size="8" fill="#2d2640">Viewport</text>
  <rect x="85" y="148" width="10" height="10" rx="4" fill="#5b6abf" opacity="0.7"/>
  <text x="99" y="157" font-family="sans-serif" font-size="8" fill="#2d2640">Scrollbar thumb</text>
  <rect x="190" y="148" width="10" height="10" rx="4" fill="#d8cfe8" opacity="0.5"/>
  <text x="204" y="157" font-family="sans-serif" font-size="8" fill="#2d2640">Scrollbar track</text>
</svg>
