<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130">
  <!-- Outer frame -->
  <rect x="4" y="4" width="340" height="85" rx="4" fill="none" stroke="#3b2d5e" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="10" y="14" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">CollapsibleSection</text>
  <!-- Title row (always visible) -->
  <rect x="10" y="18" width="328" height="24" rx="2" fill="#fff0d6" opacity="0.5"/>
  <!-- Chevron -->
  <rect x="14" y="22" width="14" height="14" rx="2" fill="#8b5fbf" opacity="0.35"/>
  <text x="21" y="33" font-family="sans-serif" font-size="11" fill="#3b2d5e" text-anchor="middle">▶</text>
  <!-- Title text -->
  <rect x="34" y="22" width="120" height="14" rx="2" fill="#fdffb6" opacity="0.45"/>
  <text x="94" y="33" font-family="sans-serif" font-size="10" fill="#2d2640" text-anchor="middle" font-weight="bold">Title (BodyBold)</text>
  <text x="270" y="33" font-family="sans-serif" font-size="7" fill="#8b5fbf">← title row (always visible)</text>
  <!-- Separator -->
  <line x1="10" y1="44" x2="338" y2="44" stroke="#d8cfe8" stroke-width="1"/>
  <!-- Content area (shown when expanded) -->
  <rect x="14" y="48" width="324" height="34" rx="2" fill="#eaf8ff" opacity="0.4" stroke="#5b6abf" stroke-width="0.6" stroke-dasharray="3,2"/>
  <text x="176" y="69" font-family="sans-serif" font-size="9" fill="#2d2640" text-anchor="middle">(child widgets)</text>
  <text x="270" y="78" font-family="sans-serif" font-size="7" fill="#8b5fbf">← shown when expanded</text>
  <!-- Legend -->
  <rect x="10" y="102" width="10" height="10" rx="2" fill="#8b5fbf" opacity="0.5"/>
  <text x="24" y="111" font-family="sans-serif" font-size="8" fill="#2d2640">Chevron</text>
  <rect x="75" y="102" width="10" height="10" rx="1" fill="#fdffb6" opacity="0.7"/>
  <text x="89" y="111" font-family="sans-serif" font-size="8" fill="#2d2640">Title</text>
  <rect x="120" y="102" width="10" height="10" rx="1" fill="#eaf8ff" stroke="#5b6abf" stroke-width="0.5"/>
  <text x="134" y="111" font-family="sans-serif" font-size="8" fill="#2d2640">Content area</text>
  <line x1="210" y1="107" x2="230" y2="107" stroke="#d8cfe8" stroke-width="1.5"/>
  <text x="234" y="111" font-family="sans-serif" font-size="8" fill="#2d2640">Separator</text>
</svg>
