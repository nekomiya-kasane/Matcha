<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <style>
      .border { fill: none; stroke: #5b6abf; stroke-width: 1.5; rx: 6; }
      .fill-bg { fill: #fffffc; }
      .field-bg { fill: #eaf8ff; }
      .label { fill: #2d2640; font-size: 11px; }
      .slot { fill: #5b6abf; font-size: 10px; font-weight: 600; }
      .desc { fill: #8b5fbf; font-size: 10px; font-style: italic; }
      .divider { stroke: #d8cfe8; stroke-width: 1; }
      .header-bg { fill: #2d2640; }
    </style>
  </defs>
  <!-- Panel container -->
  <rect class="fill-bg" x="10" y="10" width="260" height="210" rx="6"/>
  <rect class="border" x="10" y="10" width="260" height="210"/>
  <!-- Panel Header -->
  <rect class="header-bg" x="10" y="10" width="260" height="26" rx="6"/>
  <rect class="header-bg" x="10" y="24" width="260" height="12"/>
  <text x="20" y="28" font-size="11" fill="#fffffc" font-weight="700">Panel Header: [Title]</text>
  <rect x="242" y="14" width="18" height="18" rx="3" fill="#ffadad" opacity="0.3"/>
  <text x="247" y="27" font-size="11" fill="#fffffc">×</text>
  <text class="desc" x="278" y="28">24px, BodyBold</text>
  <!-- Section A (expanded) -->
  <text class="label" x="20" y="52" font-weight="600">▼ Section A</text>
  <text class="desc" x="130" y="52">CollapsibleSection</text>
  <!-- FormLayout rows -->
  <text class="label" x="30" y="70" text-anchor="start" font-size="10">Label:</text>
  <rect class="field-bg" x="90" y="58" width="160" height="18" rx="3"/>
  <text class="label" x="96" y="71" font-size="10">[Field]</text>
  <text class="label" x="30" y="92" text-anchor="start" font-size="10">Label:</text>
  <rect class="field-bg" x="90" y="80" width="160" height="18" rx="3"/>
  <text class="label" x="96" y="93" font-size="10">[Field]</text>
  <text class="desc" x="258" y="78">FormLayout(Horizontal)</text>
  <!-- Section B (collapsed) -->
  <text class="label" x="20" y="118" font-weight="600" opacity="0.6">▶ Section B (collapsed)</text>
  <!-- Section C (expanded) -->
  <text class="label" x="20" y="144" font-weight="600">▼ Section C</text>
  <text class="label" x="30" y="162" font-size="10">Label:</text>
  <rect class="field-bg" x="90" y="150" width="160" height="18" rx="3"/>
  <text class="label" x="96" y="163" font-size="10">[Field]</text>
  <text class="label" x="30" y="184" font-size="10">Label:</text>
  <rect class="field-bg" x="90" y="172" width="160" height="18" rx="3"/>
  <text class="label" x="96" y="185" font-size="10">[Field]</text>
  <!-- ScrollArea indicator -->
  <text class="desc" x="20" y="212">ScrollArea wraps all sections</text>
  <!-- Legend -->
  <text class="desc" x="10" y="236">Header → CollapsibleSection(s) → FormLayout rows, all in ScrollArea</text>
</svg>
