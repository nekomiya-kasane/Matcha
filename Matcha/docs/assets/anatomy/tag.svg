<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50">
  <!-- Tag outer border -->
  <rect x="4" y="4" width="160" height="24" rx="12" fill="#fffffc" stroke="#3b2d5e" stroke-width="1"/>
  <!-- padH left -->
  <rect x="6" y="6" width="10" height="20" rx="2" fill="#8b5fbf" opacity="0.2"/>
  <!-- Text slot -->
  <rect x="20" y="6" width="80" height="20" rx="2" fill="#fdffb6" opacity="0.45"/>
  <text x="60" y="20" font-family="sans-serif" font-size="10" fill="#2d2640" text-anchor="middle">Tag text</text>
  <!-- Close icon slot -->
  <rect x="104" y="8" width="16" height="16" rx="8" fill="#ffadad" opacity="0.45"/>
  <text x="112" y="20" font-family="sans-serif" font-size="11" fill="#2d2640" text-anchor="middle">×</text>
  <!-- padH right -->
  <rect x="124" y="6" width="10" height="20" rx="2" fill="#8b5fbf" opacity="0.2"/>
  <!-- Legend -->
  <rect x="4" y="36" width="10" height="10" rx="1" fill="#fdffb6" opacity="0.7"/>
  <text x="18" y="45" font-family="sans-serif" font-size="8" fill="#2d2640">Text</text>
  <rect x="50" y="36" width="10" height="10" rx="5" fill="#ffadad" opacity="0.6"/>
  <text x="64" y="45" font-family="sans-serif" font-size="8" fill="#2d2640">Close icon</text>
  <rect x="120" y="36" width="10" height="10" rx="1" fill="#8b5fbf" opacity="0.4"/>
  <text x="134" y="45" font-family="sans-serif" font-size="8" fill="#2d2640">Padding</text>
</svg>
