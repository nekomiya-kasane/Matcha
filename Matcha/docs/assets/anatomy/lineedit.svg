<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <!-- Input field outer border -->
  <rect x="4" y="4" width="412" height="44" rx="4" ry="4" fill="#fffffc" stroke="#3b2d5e" stroke-width="1.2"/>
  <!-- Focus ring -->
  <rect x="2" y="2" width="416" height="48" rx="6" ry="6" fill="none" stroke="#5b6abf" stroke-width="2" stroke-dasharray="5 2" opacity="0.5"/>
  <!-- padH left -->
  <rect x="7" y="8" width="16" height="36" rx="2" fill="#8b5fbf" opacity="0.2"/>
  <text x="15" y="30" font-family="sans-serif" font-size="7" fill="#8b5fbf" text-anchor="middle">pad</text>
  <!-- Prefix icon slot -->
  <rect x="27" y="15" width="22" height="22" rx="3" fill="#9bf6ff" opacity="0.5"/>
  <text x="38" y="30" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="middle">Pre</text>
  <!-- Text / placeholder slot -->
  <rect x="55" y="10" width="220" height="32" rx="3" fill="#fdffb6" opacity="0.4"/>
  <text x="165" y="31" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle" font-style="italic">Placeholder text...</text>
  <!-- Clear button slot -->
  <rect x="281" y="15" width="22" height="22" rx="11" fill="#ffadad" opacity="0.45"/>
  <text x="292" y="30" font-family="sans-serif" font-size="11" fill="#2d2640" text-anchor="middle">×</text>
  <!-- Suffix icon slot -->
  <rect x="309" y="15" width="22" height="22" rx="3" fill="#bdb2ff" opacity="0.5"/>
  <text x="320" y="30" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="middle">Suf</text>
  <!-- padH right -->
  <rect x="337" y="8" width="16" height="36" rx="2" fill="#8b5fbf" opacity="0.2"/>
  <text x="345" y="30" font-family="sans-serif" font-size="7" fill="#8b5fbf" text-anchor="middle">pad</text>
  <!-- Validation message below -->
  <rect x="4" y="56" width="412" height="20" rx="3" fill="#ffadad" opacity="0.15"/>
  <text x="20" y="70" font-family="sans-serif" font-size="9" fill="#DC2626">⚠ Validation error message (optional)</text>
  <!-- Legend -->
  <rect x="4" y="84" width="10" height="10" rx="1" fill="#9bf6ff" opacity="0.7"/>
  <text x="18" y="93" font-family="sans-serif" font-size="8" fill="#2d2640">Prefix icon</text>
  <rect x="80" y="84" width="10" height="10" rx="1" fill="#fdffb6" opacity="0.7"/>
  <text x="94" y="93" font-family="sans-serif" font-size="8" fill="#2d2640">Text/Placeholder</text>
  <rect x="180" y="84" width="10" height="10" rx="1" fill="#ffadad" opacity="0.6"/>
  <text x="194" y="93" font-family="sans-serif" font-size="8" fill="#2d2640">Clear btn</text>
  <rect x="248" y="84" width="10" height="10" rx="1" fill="#bdb2ff" opacity="0.7"/>
  <text x="262" y="93" font-family="sans-serif" font-size="8" fill="#2d2640">Suffix icon</text>
  <rect x="326" y="84" width="10" height="10" rx="1" fill="#8b5fbf" opacity="0.4"/>
  <text x="340" y="93" font-family="sans-serif" font-size="8" fill="#2d2640">Padding</text>
</svg>
