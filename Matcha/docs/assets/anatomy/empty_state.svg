<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <style>
      .border { fill: none; stroke: #5b6abf; stroke-width: 1.5; rx: 6; }
      .fill-bg { fill: #fffffc; }
      .label { fill: #2d2640; font-size: 11px; }
      .desc { fill: #8b5fbf; font-size: 10px; font-style: italic; }
      .btn-primary { fill: #5b6abf; }
      .btn-text { fill: #fffffc; font-size: 10px; }
    </style>
  </defs>
  <!-- Container -->
  <rect class="fill-bg" x="10" y="10" width="260" height="180" rx="6"/>
  <rect class="border" x="10" y="10" width="260" height="180"/>
  <!-- Illustration placeholder (128px) -->
  <rect x="102" y="24" width="76" height="48" rx="8" fill="#eaf8ff" stroke="#b8e4f9" stroke-width="1"/>
  <text x="140" y="52" text-anchor="middle" font-size="20" fill="#5b6abf" opacity="0.5">📄</text>
  <text class="desc" x="270" y="52">Illustration, 128px</text>
  <!-- Title -->
  <text class="label" x="140" y="92" text-anchor="middle" font-weight="700" font-size="12">No items</text>
  <text class="desc" x="270" y="92">BodyBold, TextPrimary</text>
  <!-- Description -->
  <text x="140" y="110" text-anchor="middle" font-size="10" fill="#8b5fbf">Click + to add your first item</text>
  <text class="desc" x="270" y="110">Body, TextSecondary</text>
  <!-- CTA Button -->
  <rect class="btn-primary" x="110" y="126" width="60" height="22" rx="4"/>
  <text class="btn-text" x="140" y="140" text-anchor="middle">Add Item</text>
  <text class="desc" x="270" y="140">PushButton Primary</text>
  <!-- Spacing annotations -->
  <line x1="140" y1="74" x2="140" y2="80" stroke="#d8cfe8" stroke-width="0.8" stroke-dasharray="2"/>
  <text class="desc" x="148" y="79" font-size="8">Px16</text>
  <line x1="140" y1="96" x2="140" y2="102" stroke="#d8cfe8" stroke-width="0.8" stroke-dasharray="2"/>
  <text class="desc" x="148" y="101" font-size="8">Px8</text>
  <line x1="140" y1="116" x2="140" y2="122" stroke="#d8cfe8" stroke-width="0.8" stroke-dasharray="2"/>
  <text class="desc" x="148" y="121" font-size="8">Px16</text>
  <!-- Legend -->
  <text class="desc" x="10" y="210">Centered in region | Illustration→Title: Px16 | Title→Desc: Px8 | Desc→CTA: Px16</text>
</svg>
