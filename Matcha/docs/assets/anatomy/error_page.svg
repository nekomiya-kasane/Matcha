<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <style>
      .border { fill: none; stroke: #5b6abf; stroke-width: 1.5; rx: 6; }
      .fill-bg { fill: #fffffc; }
      .label { fill: #2d2640; font-size: 11px; }
      .desc { fill: #8b5fbf; font-size: 10px; font-style: italic; }
      .btn-primary { fill: #5b6abf; }
      .btn-ghost { fill: none; stroke: #5b6abf; stroke-width: 1; }
      .btn-text-light { fill: #fffffc; font-size: 10px; }
      .btn-text-dark { fill: #5b6abf; font-size: 10px; }
      .muted { fill: #d8cfe8; font-size: 9px; }
    </style>
  </defs>
  <!-- Container -->
  <rect class="fill-bg" x="10" y="10" width="300" height="200" rx="6"/>
  <rect class="border" x="10" y="10" width="300" height="200"/>
  <!-- Error icon -->
  <circle cx="160" cy="36" r="18" fill="#ffadad" opacity="0.3"/>
  <text x="160" y="42" text-anchor="middle" font-size="18" fill="#ffadad">⚠</text>
  <text class="desc" x="320" y="40">ErrorIcon 48px</text>
  <!-- Title -->
  <text class="label" x="160" y="72" text-anchor="middle" font-weight="700" font-size="12">Something went wrong</text>
  <text class="desc" x="320" y="72">BodyBold, TextPrimary</text>
  <!-- Detail -->
  <text x="160" y="92" text-anchor="middle" font-size="10" fill="#8b5fbf">The mesh renderer encountered</text>
  <text x="160" y="106" text-anchor="middle" font-size="10" fill="#8b5fbf">an unexpected state.</text>
  <text class="desc" x="320" y="96">Body, TextSecondary</text>
  <!-- Error code -->
  <text class="muted" x="160" y="126" text-anchor="middle">ERR_RENDERER_CRASH (0x8001)</text>
  <text class="desc" x="320" y="126">Caption, TextTertiary</text>
  <!-- Buttons -->
  <rect class="btn-primary" x="96" y="144" width="56" height="24" rx="4"/>
  <text class="btn-text-light" x="124" y="160" text-anchor="middle">Retry</text>
  <rect class="btn-ghost" x="162" y="144" width="72" height="24" rx="4"/>
  <text class="btn-text-dark" x="198" y="160" text-anchor="middle">Report Bug</text>
  <text class="desc" x="320" y="160">Primary + Ghost</text>
  <!-- Legend -->
  <text class="desc" x="10" y="230">Full-region error page for Fatal errors | Replaces viewport/panel content entirely</text>
</svg>
