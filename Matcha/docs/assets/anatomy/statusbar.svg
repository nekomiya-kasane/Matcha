<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 50" width="480" height="50">
  <!-- StatusBar frame -->
  <rect x="4" y="4" width="460" height="26" rx="3" fill="#eaf8ff" opacity="0.2" stroke="#3b2d5e" stroke-width="1"/>
  <text x="8" y="14" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">StatusBar (SurfaceSunken, Caption font)</text>
  <!-- Left items -->
  <rect x="10" y="14" width="180" height="12" rx="2" fill="#fdffb6" opacity="0.3"/>
  <text x="14" y="23" font-family="sans-serif" font-size="8" fill="#2d2640">status text, progress...</text>
  <!-- Flex spacer -->
  <text x="234" y="23" font-family="sans-serif" font-size="8" fill="#d8cfe8" text-anchor="middle">···</text>
  <!-- Right items -->
  <rect x="280" y="14" width="178" height="12" rx="2" fill="#caffbf" opacity="0.3"/>
  <text x="458" y="23" font-family="sans-serif" font-size="8" fill="#2d2640" text-anchor="end">zoom, cursor pos</text>
  <!-- Legend -->
  <rect x="10" y="38" width="10" height="8" rx="1" fill="#fdffb6" opacity="0.5"/>
  <text x="24" y="45" font-family="sans-serif" font-size="7" fill="#2d2640">Left items</text>
  <rect x="100" y="38" width="10" height="8" rx="1" fill="#caffbf" opacity="0.5"/>
  <text x="114" y="45" font-family="sans-serif" font-size="7" fill="#2d2640">Right items</text>
  <text x="200" y="45" font-family="sans-serif" font-size="7" fill="#d8cfe8">···</text>
  <text x="214" y="45" font-family="sans-serif" font-size="7" fill="#2d2640">Flex spacer</text>
</svg>
