<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 178" width="320" height="178">
  <!-- Trigger field -->
  <rect x="4" y="4" width="312" height="44" rx="4" ry="4" fill="#fffffc" stroke="#3b2d5e" stroke-width="1.2"/>
  <!-- padH left -->
  <rect x="8" y="8" width="14" height="36" rx="2" fill="#8b5fbf" opacity="0.2"/>
  <!-- Selected text slot -->
  <rect x="26" y="10" width="220" height="32" rx="3" fill="#fdffb6" opacity="0.4"/>
  <text x="136" y="31" font-family="sans-serif" font-size="12" fill="#2d2640" text-anchor="middle">Selected item</text>
  <!-- Dropdown arrow -->
  <rect x="252" y="14" width="28" height="24" rx="3" fill="#9bf6ff" opacity="0.5"/>
  <text x="266" y="31" font-family="sans-serif" font-size="14" fill="#2d2640" text-anchor="middle">▼</text>
  <!-- padH right -->
  <rect x="286" y="8" width="14" height="36" rx="2" fill="#8b5fbf" opacity="0.2"/>
  <!-- Arrow indicator -->
  <line x1="160" y1="50" x2="160" y2="60" stroke="#3b2d5e" stroke-width="1.5"/>
  <text x="172" y="58" font-family="sans-serif" font-size="8" fill="#3b2d5e" font-style="italic">(open)</text>
  <!-- Dropdown popup -->
  <rect x="4" y="64" width="312" height="96" rx="4" ry="4" fill="#eaf8ff" stroke="#3b2d5e" stroke-width="1"/>
  <!-- Item 0 — hovered -->
  <rect x="8" y="68" width="304" height="26" rx="3" fill="#bdb2ff" opacity="0.4"/>
  <text x="20" y="85" font-family="sans-serif" font-size="11" fill="#2d2640">Item 0 (hovered)</text>
  <!-- Item 1 -->
  <rect x="8" y="96" width="304" height="26" rx="3" fill="#caffbf" opacity="0.2"/>
  <text x="20" y="113" font-family="sans-serif" font-size="11" fill="#2d2640">Item 1</text>
  <!-- Item 2 -->
  <rect x="8" y="124" width="304" height="26" rx="3" fill="#caffbf" opacity="0.2"/>
  <text x="20" y="141" font-family="sans-serif" font-size="11" fill="#2d2640">Item 2</text>
  <!-- Legend -->
  <rect x="4" y="165" width="8" height="8" rx="1" fill="#fdffb6" opacity="0.7"/>
  <text x="16" y="172" font-family="sans-serif" font-size="7" fill="#2d2640">Selected text</text>
  <rect x="80" y="165" width="8" height="8" rx="1" fill="#9bf6ff" opacity="0.7"/>
  <text x="92" y="172" font-family="sans-serif" font-size="7" fill="#2d2640">Arrow</text>
  <rect x="122" y="165" width="8" height="8" rx="1" fill="#bdb2ff" opacity="0.6"/>
  <text x="134" y="172" font-family="sans-serif" font-size="7" fill="#2d2640">Hovered item</text>
  <rect x="196" y="165" width="8" height="8" rx="1" fill="#caffbf" opacity="0.4"/>
  <text x="208" y="172" font-family="sans-serif" font-size="7" fill="#2d2640">List items</text>
  <rect x="258" y="165" width="8" height="8" rx="1" fill="#8b5fbf" opacity="0.4"/>
  <text x="270" y="172" font-family="sans-serif" font-size="7" fill="#2d2640">Padding</text>
</svg>
