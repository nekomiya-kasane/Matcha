<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="380" height="180">
  <!-- Outer frame -->
  <rect x="4" y="4" width="340" height="140" rx="4" fill="none" stroke="#3b2d5e" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="10" y="14" font-family="sans-serif" font-size="7" fill="#3b2d5e" font-style="italic">TreeWidget</text>
  <!-- TitleBar -->
  <rect x="10" y="18" width="328" height="20" rx="2" fill="#fff0d6" opacity="0.4"/>
  <text x="14" y="28" font-family="sans-serif" font-size="7" fill="#8b5fbf" font-style="italic">TitleBar</text>
  <text x="14" y="36" font-family="sans-serif" font-size="9" fill="#2d2640" font-weight="bold">Title text</text>
  <!-- TreeBody -->
  <rect x="10" y="40" width="328" height="98" rx="2" fill="#fffffc" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="14" y="50" font-family="sans-serif" font-size="7" fill="#8b5fbf" font-style="italic">TreeBody</text>
  <!-- Root Item A (expanded) -->
  <text x="18" y="64" font-family="sans-serif" font-size="9" fill="#5b6abf">▼</text>
  <rect x="30" y="56" width="12" height="12" rx="2" fill="#d8cfe8" opacity="0.35"/>
  <text x="46" y="66" font-family="sans-serif" font-size="9" fill="#2d2640">Root Item A</text>
  <!-- Child A.1 (collapsed) -->
  <line x1="28" y1="68" x2="28" y2="80" stroke="#d8cfe8" stroke-width="0.5"/>
  <line x1="28" y1="80" x2="38" y2="80" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="42" y="82" font-family="sans-serif" font-size="9" fill="#5b6abf">▶</text>
  <text x="56" y="82" font-family="sans-serif" font-size="9" fill="#2d2640">Child A.1</text>
  <!-- Leaf A.1.1 -->
  <line x1="50" y1="84" x2="50" y2="94" stroke="#d8cfe8" stroke-width="0.5"/>
  <line x1="50" y1="94" x2="60" y2="94" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="64" y="96" font-family="sans-serif" font-size="8" fill="#2d2640">Leaf A.1.1</text>
  <!-- Leaf A.2 -->
  <line x1="28" y1="80" x2="28" y2="106" stroke="#d8cfe8" stroke-width="0.5"/>
  <line x1="28" y1="106" x2="38" y2="106" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="42" y="108" font-family="sans-serif" font-size="8" fill="#2d2640">Leaf A.2</text>
  <!-- Root Item B (selected) -->
  <rect x="12" y="112" width="324" height="16" rx="2" fill="#5b6abf" opacity="0.15"/>
  <text x="18" y="124" font-family="sans-serif" font-size="9" fill="#5b6abf">▼</text>
  <rect x="30" y="114" width="12" height="12" rx="2" fill="#5b6abf" opacity="0.3"/>
  <text x="46" y="124" font-family="sans-serif" font-size="9" fill="#2d2640" font-weight="bold">Root Item B</text>
  <text x="138" y="124" font-family="sans-serif" font-size="7" fill="#5b6abf">← selected (PrimaryBg)</text>
  <!-- Leaf B.1 -->
  <line x1="28" y1="128" x2="28" y2="135" stroke="#d8cfe8" stroke-width="0.5"/>
  <line x1="28" y1="135" x2="38" y2="135" stroke="#d8cfe8" stroke-width="0.5"/>
  <text x="42" y="137" font-family="sans-serif" font-size="8" fill="#2d2640">Leaf B.1</text>
  <!-- Legend -->
  <rect x="10" y="158" width="10" height="10" rx="1" fill="#fff0d6" opacity="0.5"/>
  <text x="24" y="167" font-family="sans-serif" font-size="8" fill="#2d2640">TitleBar</text>
  <text x="80" y="167" font-family="sans-serif" font-size="9" fill="#5b6abf">▼▶</text>
  <text x="96" y="167" font-family="sans-serif" font-size="8" fill="#2d2640">Chevron</text>
  <rect x="145" y="158" width="10" height="10" rx="2" fill="#d8cfe8" opacity="0.4"/>
  <text x="159" y="167" font-family="sans-serif" font-size="8" fill="#2d2640">Icon</text>
  <rect x="190" y="158" width="10" height="10" rx="1" fill="#5b6abf" opacity="0.2"/>
  <text x="204" y="167" font-family="sans-serif" font-size="8" fill="#2d2640">Selected</text>
</svg>
